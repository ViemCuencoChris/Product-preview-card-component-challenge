<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <div class="product">
    <div class="product_image">
      <img src="images/image-product-mobile.jpg" alt="mobile_perfume">
      <img src="images/image-product-desktop.jpg" alt="pc_perfume">
    </div>
    <div class="product_description">
      <h1>PERFUME</h1>
      <h2>Gabrielle Essence Eau De Parfum</h2>
      <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
    Perfumer-Creator for the House of CHANEL.</p>
      <div class="price_description">
        <h3>$149.99</h3>
        <h3>$169.99</h3>
      </div>
      <button class="add_cart"><i class="fi fi-rr-shopping-cart"></i> Add to Cart</button>
    </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/ViemCuencoChris">Viem</a>.
  </footer>
</body>
</html>
